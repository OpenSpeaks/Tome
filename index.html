function normLicense(raw) {
  if (!raw) return "";
  const r = raw.toLowerCase();
  if (r.includes("by-sa 4") || r.includes("cc-by-sa-4") || r.includes("by-sa-4")) return "cc-by-sa-4.0";
  if (r.includes("by-sa 3") || r.includes("cc-by-sa-3")) return "cc-by-sa-3.0";
  if (r.includes("by-sa 2") || r.includes("cc-by-sa-2")) return "cc-by-sa-2.0";
  if (r.includes("by 4.0") || r.includes("cc-by-4") || r.includes("cc by 4")) return "cc-by-4.0";
  if (r.includes("by 3.0") || r.includes("cc-by-3")) return "cc-by-3.0";
  if (r.includes("by 2.0") || r.includes("cc-by-2")) return "cc-by-2.0";
  if (r.includes("cc0") || r.includes("public domain") || r.includes("cc-zero")) return "cc-zero";
  if (r.includes("all rights reserved")) return "All rights reserved";
  return raw;
}

function arr(v) { return Array.isArray(v) ? v : (v ? [v] : []); }

function normWebMeta(meta) {
  if (!meta || typeof meta !== "object") return null;
  const r = {};
  const s = (v) => (v || "").toString().trim();
  const join = (v, sep) => arr(v).filter(Boolean).join(sep || ", ");

  if (meta.title) r.title = s(meta.title);
  if (meta.originalTitle || meta.original_title) r.originalTitle = s(meta.originalTitle || meta.original_title);
  if (meta.year) r.year = s(meta.year);

  // description — may be array or string
  const desc = meta.description || meta.synopsis || meta.summary || "";
  if (desc) r.description = Array.isArray(desc) ? desc.join("\n\n") : s(desc);

  // languages — may be [{name, iso639}] or string
  if (meta.languages && Array.isArray(meta.languages) && meta.languages.length) {
    const first = meta.languages[0];
    r.language = s(first.name || first);
    if (first.iso639) r.languageISO = s(first.iso639);
  } else if (meta.language) {
    const isoD = extractISO639(s(meta.language));
    if (isoD) { r.language = isoD.language; r.languageISO = isoD.languageISO; }
    else r.language = s(meta.language);
  }
  if (meta.languageISO) r.languageISO = s(meta.languageISO);

  if (meta.duration || meta.runtime) r.duration = s(meta.duration || meta.runtime);
  if (meta.color) r.color = s(meta.color);
  if (meta.sound) r.sound = s(meta.sound);
  if (meta.genre) r.genre = s(meta.genre);

  const topic = meta.topic || meta.topics || meta.topic_keywords || meta.subject || meta.keywords;
  if (topic) r.topic = join(topic, "; ");

  if (meta.cast) r.cast = join(meta.cast);
  if (meta.director || meta.directors) r.director = join(meta.director || meta.directors);
  if (meta.producer || meta.producers) r.producer = join(meta.producer || meta.producers);
  if (meta.writer || meta.writers) r.writer = join(meta.writer || meta.writers);
  if (meta.cinematographer || meta.camera) r.cinematographer = join(meta.cinematographer || meta.camera);
  if (meta.editor || meta.editors) r.editor = join(meta.editor || meta.editors);
  if (meta.recordist) r.recordist = join(meta.recordist);
  if (meta.creator || meta.creators) {
    // If no director/producer, map creator to producer
    if (!r.producer) r.producer = join(meta.creator || meta.creators);
  }

  const pub = meta.releaseDate || meta.publicationDate || meta.publication_date || meta.date || "";
  if (pub) r.releaseDate = s(pub);
  const rec = meta.recordingDate || meta.recording_date || "";
  if (rec) r.date = s(rec);

  if (meta.projectName || meta.project_name || meta.collection) r.projectName = s(meta.projectName || meta.project_name || meta.collection);
  if (meta.recordingPlace || meta.recording_place || meta.location) r.recordingPlace = s(meta.recordingPlace || meta.recording_place || meta.location);
  if (meta.country) r.country = s(meta.country);

  const sc = meta.subtitleCreators || meta.translation_credits || meta.subtitledBy;
  if (sc) r.subtitleCreators = join(sc);
  if (meta.subtitleLanguage) r.subtitleLanguage = s(meta.subtitleLanguage);

  const copy = meta.copyrightHolder || meta.copyright || meta.rights_holder || "";
  if (copy) r.copyrightHolder = s(copy);

  const lic = meta.license || meta.licenseurl || meta.license_name || meta.license_uri || "";
  if (lic) r.license = normLicense(s(lic));

  if (meta.imdb) r.imdb = s(meta.imdb);
  if (meta.doi || meta.eidr) r.doi = s(meta.doi || meta.eidr);

  const cats = meta.categories || meta.category || meta.tags || [];
  if (cats && arr(cats).length) r.categories = join(cats, "\n");

  return Object.keys(r).length > 0 ? r : null;
}

// ── Archive.org: uses their public metadata JSON API ─────────────────────────
async function fetchArchiveOrgMeta(url) {
  const m = url.match(/archive\.org\/(?:details|embed)\/([^/?#\s]+)/);
  if (!m) throw new Error("Could not read the Archive.org identifier from the URL. Example: archive.org/details/IDENTIFIER");
  const id = m[1];
  const apiUrl = "https://archive.org/metadata/" + id;
  const res = await fetch(apiUrl, { mode: "cors" });
  if (!res.ok) throw new Error("Archive.org API returned error " + res.status);
  const json = await res.json();
  const meta = json.metadata || {};
  return normWebMeta({
    title: meta.title,
    description: meta.description,
    year: meta.year || (meta.date || "").slice(0, 4),
    language: Array.isArray(meta.language) ? meta.language[0] : meta.language,
    duration: meta.runtime,
    color: meta.color,
    sound: meta.sound,
    genre: meta.mediatype,
    topic: meta.subject,
    director: meta.director,
    creator: meta.creator,
    producer: meta.producer,
    releaseDate: meta.date,
    collection: Array.isArray(meta.collection) ? meta.collection.filter(x => x !== "opensource").join(", ") : meta.collection,
    copyrightHolder: meta.credits,
    license: meta.licenseurl || meta.rights,
    imdb: (meta.identifier_arc || meta.external_identifier || []).find ? 
      (arr(meta.external_identifier || []).find(x => /imdb/i.test(x)) || "").replace(/.*\/title\/(tt\d+).*/i, "$1") : "",
  });
}

// ── Wikidata: uses the entity JSON API ────────────────────────────────────────
async function fetchWikidataMeta(url) {
  const m = url.match(/wikidata\.org\/wiki\/(Q\d+)/i) || url.match(/^(Q\d+)$/i);
  if (!m) throw new Error("Could not read a Wikidata Q-number from the URL. Example: https://www.wikidata.org/wiki/Q12345");
  const qid = m[1];
  const apiUrl = "https://www.wikidata.org/w/api.php?action=wbgetentities&ids=" + qid + "&format=json&origin=*";
  const res = await fetch(apiUrl);
  if (!res.ok) throw new Error("Wikidata API returned error " + res.status);
  const json = await res.json();
  const entity = (json.entities || {})[qid];
  if (!entity) throw new Error("No Wikidata entity found for " + qid);

  const label = (entity.labels?.en?.value) || (Object.values(entity.labels || {})[0]?.value) || "";
  const desc = (entity.descriptions?.en?.value) || "";

  // Extract common claims. P57=director, P136=genre, P364=orig lang, P577=pub date, P2047=duration
  const claims = entity.claims || {};
  function claimStr(prop) {
    const cs = claims[prop];
    if (!cs || !cs.length) return "";
    const v = cs[0]?.mainsnak?.datavalue?.value;
    if (!v) return "";
    if (typeof v === "string") return v;
    if (v.time) return v.time.replace(/^\+/, "").slice(0, 10);
    if (v.amount) return v.amount.replace(/^\+/, "");
    if (v.id) return v.id; // Q-number for entity references
    return "";
  }
  function claimLabels(prop, lang) {
    const cs = claims[prop];
    if (!cs) return [];
    return cs.slice(0, 5).map(x => {
      const id = x?.mainsnak?.datavalue?.value?.id;
      if (!id) return "";
      // Return Qid as fallback — caller can resolve if needed
      return id;
    }).filter(Boolean);
  }

  return normWebMeta({
    title: label,
    description: desc,
    releaseDate: claimStr("P577"),
    duration: claimStr("P2047"),
    // For entities, qids won't resolve to names here but are preserved
  });
}

// ── AI-powered extraction via Anthropic API + web_search ─────────────────────
async function fetchWithClaude(url, siteName) {
  const systemPrompt = "You are a metadata extraction assistant for a language archive tool. Use web_search to visit the URL and extract all available metadata. Return ONLY a valid JSON object. No markdown fences, no explanation, no preamble.";
  const userPrompt = `Visit this ${siteName} page and extract all metadata: ${url}

Return a JSON object with these fields (include only fields you found; omit absent ones):
{
  "title": "",
  "originalTitle": "",
  "year": "",
  "description": "main synopsis or description text",
  "language": "name of the main spoken language",
  "languageISO": "ISO 639-1/2/3 code",
  "duration": "e.g. 10:30 or 45 min",
  "color": "Color or Black and White",
  "sound": "Stereo, Mono, or Silent",
  "genre": "",
  "topic": ["array of topics or keywords"],
  "cast": ["array of performer or speaker names"],
  "director": ["array"],
  "producer": ["array"],
  "writer": ["array"],
  "cinematographer": ["array"],
  "editor": ["array"],
  "recordist": ["array"],
  "releaseDate": "YYYY-MM-DD",
  "date": "YYYY-MM-DD recording date",
  "projectName": "project or collection name",
  "recordingPlace": "city, district, country",
  "subtitleCreators": ["names of subtitle/translation contributors"],
  "subtitleLanguage": "",
  "copyrightHolder": "",
  "license": "e.g. CC BY-SA 4.0",
  "imdb": "tt1234567",
  "categories": ["array"],
  "country": ""
}`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system: systemPrompt,
      tools: [{ type: "web_search_20250305", name: "web_search" }],
      messages: [{ role: "user", content: userPrompt }],
    })
  });

  const data = await response.json();
  if (data.error) throw new Error(data.error.message || "Anthropic API error");

  const text = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("\n");
  const clean = text.replace(/```json|```/g, "").trim();
  const jStart = clean.indexOf("{");
  const jEnd = clean.lastIndexOf("}");
  if (jStart === -1) throw new Error("AI could not extract metadata from this page. Try pasting the page text below instead.");
  const meta = JSON.parse(clean.slice(jStart, jEnd + 1));
  return normWebMeta(meta);
}

// ── Main URL dispatcher ───────────────────────────────────────────────────────
function detectSite(url) {
  if (/commons\.wikimedia\.org/i.test(url)) return "commons";
  if (/archive\.org/i.test(url)) return "archive.org";
  if (/wikidata\.org/i.test(url)) return "wikidata";
  if (/pad\.ma/i.test(url)) return "pad.ma";
  if (/indiancine\.ma/i.test(url)) return "indiancine.ma";
  if (/elararchive\.org/i.test(url)) return "elar";
  return "other";
}

function App() {
  const [record, setRecord] = useState(defaultRecord);
  const [activeTab, setActiveTab] = useState("import");
  const [pasteInput, setPasteInput] = useState("");
  const [commonsUrl, setCommonsUrl] = useState("");
  const [fetchingCommons, setFetchingCommons] = useState(false);
  const [parseMsg, setParseMsg] = useState({ type: "", text: "" });
  const [exportFmt, setExportFmt] = useState("wikicode");
  const [copied, setCopied] = useState(false);
  const [clearMsg, setClearMsg] = useState("");

  const updateField = useCallback((field, value) => setRecord(r => ({ ...r, [field]: value })), []);
  const updateOH = useCallback((field, value) => setRecord(r => ({ ...r, oralHistory: { ...r.oralHistory, [field]: value } })), []);

  const addInterviewee = () => setRecord(r => ({ ...r, interviewees: [...r.interviewees, { fullName: "", wikidataQid: "", gender: "unknown", role: "Participant" }] }));
  const updateIE = (idx, field, value) => setRecord(r => { const ie = [...r.interviewees]; ie[idx] = { ...ie[idx], [field]: value }; return { ...r, interviewees: ie }; });
  const removeIE = (idx) => setRecord(r => ({ ...r, interviewees: r.interviewees.filter((_, i) => i !== idx) }));

  const applyParsed = (parsed, source) => {
    if (!parsed) { setParseMsg({ type: "error", text: `Could not parse the ${source}.` }); return; }
    setRecord(r => ({ ...r, ...parsed, oralHistory: { ...r.oralHistory, ...(parsed.oralHistory || {}) } }));
    setParseMsg({ type: "success", text: `✓ Form populated from ${source}!` });
    if (activeTab === "import") setTimeout(() => setActiveTab("basic"), 1200);
  };

  const handleParseWikitext = () => {
    setParseMsg({});
    const { result: parsed, format } = parseAnyInput(pasteInput);
    applyParsed(parsed, format);
  };

  const fetchFromUrl = async () => {
    const url = commonsUrl.trim();
    if (!url) return;
    setFetchingCommons(true); setParseMsg({});
    const site = detectSite(url);
    try {
      if (site === "commons") {
        let title = url;
        const wikiMatch = title.match(/\/wiki\/([^?#]+)/);
        if (wikiMatch) title = decodeURIComponent(wikiMatch[1].replace(/_/g, " "));
        if (!title.startsWith("File:")) title = "File:" + title;
        const apiUrl = "https://commons.wikimedia.org/w/api.php?action=parse&page=" + encodeURIComponent(title) + "&prop=wikitext&format=json&origin=*";
        const res = await fetch(apiUrl);
        const json = await res.json();
        if (json.error) throw new Error(json.error.info || "API error");
        const wikitext = (json.parse && json.parse.wikitext && json.parse.wikitext["*"]) || "";
        if (!wikitext) throw new Error("No content found. Check the URL.");
        setPasteInput(wikitext);
        const parsed = parseWikitextIntoRecord(wikitext);
        applyParsed(parsed, "Commons page \"" + title + "\"");

      } else if (site === "archive.org") {
        const meta = await fetchArchiveOrgMeta(url);
        applyParsed(meta, "Internet Archive page");

      } else if (site === "wikidata") {
        const meta = await fetchWikidataMeta(url);
        applyParsed(meta, "Wikidata entity");

      } else {
        // pad.ma, indiancine.ma, ELAR, or unknown — AI-assisted
        const siteName = site === "other" ? (new URL(url).hostname) : site;
        setParseMsg({ type: "info", text: "Using AI to read " + siteName + "… this may take a few seconds." });
        const meta = await fetchWithClaude(url, siteName);
        applyParsed(meta, siteName + " page");
      }
    } catch (err) {
      const isCors = err instanceof TypeError && err.message.toLowerCase().includes("fetch");
      setParseMsg({ type: "error", text: isCors
        ? "Could not reach the page (the site does not allow external access). Try copying the page text and pasting it in the box below."
        : "Could not fetch: " + err.message });
    } finally {
      setFetchingCommons(false);
    }
  };
  // keep old name as alias so UI references still work
  const fetchFromCommons = fetchFromUrl;

  const handleFileImport = (e, adapter, label) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => applyParsed(adapter(ev.target.result), label);
    reader.readAsText(file);
    e.target.value = "";
  };

  const generatedOutput = useMemo(() => {
    const fns = { wikicode: exportToWikicode, json: exportToJSON, markdown: exportToMarkdown, html: exportToHTML };
    return (fns[exportFmt] || exportToWikicode)(record);
  }, [record, exportFmt]);

  const copyOutput = () => {
    navigator.clipboard.writeText(generatedOutput).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); });
  };

  const downloadOutput = () => {
    const exts = { wikicode: "txt", json: "json", markdown: "md", html: "html" };
    const mimes = { wikicode: "text/plain", json: "application/json", markdown: "text/markdown", html: "text/html" };
    const blob = new Blob([generatedOutput], { type: mimes[exportFmt] });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `${record.fileName.replace(/\.[^.]+$/, "") || "openspeaks"}.${exts[exportFmt]}`;
    a.click();
  };

  const resetForm = () => { setRecord(defaultRecord); setClearMsg("Form cleared."); setTimeout(() => setClearMsg(""), 2500); };

  const TABS = [
    { id: "import", icon: "📥", label: "Import" },
    { id: "basic", icon: "📄", label: "Basic Info" },
    { id: "production", icon: "🎬", label: "Production" },
    { id: "people", icon: "👥", label: "People" },
    { id: "subtitles", icon: "📝", label: "Subtitles & OH" },
    { id: "license", icon: "🏷️", label: "License" },
    { id: "export", icon: "📤", label: "Preview & Export" },
  ];

  const G2 = { display: "grid", gridTemplateColumns: "1fr 1fr", gap: "1.25rem" };
  const G3 = { display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "1.25rem" };

  return (
    <div style={{ minHeight: "100vh", background: "var(--bg)", color: "var(--text)", fontFamily: "var(--font-body)" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap');
        :root {
          --bg:#fdf8f2; --surface:#ffffff; --surface2:#f8f1e8; --surface3:#f2e8da;
          --border:#e5d8c8; --accent:#7c2d12; --accent2:#b45309; --accent-light:#fef3c7;
          --text:#1a120b; --text2:#5c4030; --muted:#9a7060; --label:#7c5540;
          --success:#14532d; --error:#7f1d1d;
          --font-display:'Lora',Georgia,serif;
          --font-body:'Outfit',system-ui,sans-serif;
          --font-mono:'JetBrains Mono',monospace;
        }
        *{box-sizing:border-box;}
        input,textarea,select{transition:border-color .15s,box-shadow .15s;}
        input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent)!important;box-shadow:0 0 0 3px rgba(124,45,18,.12);}
        .tab-btn{border:none;background:transparent;padding:.55rem .9rem;border-radius:6px 6px 0 0;cursor:pointer;font-family:var(--font-body);font-size:.78rem;font-weight:500;color:var(--muted);transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:.35rem;}
        .tab-btn:hover{color:var(--accent);background:var(--accent-light);}
        .tab-btn.active{color:var(--accent);background:var(--surface);font-weight:600;border-bottom:2.5px solid var(--accent);}
        .btn-primary{background:var(--accent);color:#fff;border:none;padding:.55rem 1.2rem;border-radius:6px;font-family:var(--font-body);font-size:.8rem;font-weight:600;cursor:pointer;transition:all .15s;letter-spacing:.02em;}
        .btn-primary:hover{background:#991b1b;transform:translateY(-1px);box-shadow:0 3px 10px rgba(124,45,18,.3);}
        .btn-sec{background:var(--surface2);color:var(--text2);border:1.5px solid var(--border);padding:.5rem .95rem;border-radius:6px;font-family:var(--font-body);font-size:.78rem;font-weight:500;cursor:pointer;transition:all .15s;}
        .btn-sec:hover{background:var(--surface3);color:var(--text);}
        .import-zone{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5rem;background:var(--surface);border:2px dashed var(--border);padding:1.5rem 1rem;border-radius:10px;font-family:var(--font-body);font-size:.82rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all .2s;text-align:center;width:100%;}
        .import-zone:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
        .efmt-btn{padding:.4rem .85rem;border-radius:5px;border:1.5px solid var(--border);font-size:.75rem;font-family:var(--font-body);font-weight:500;cursor:pointer;background:var(--surface2);color:var(--text2);transition:all .15s;}
        .efmt-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
        ::-webkit-scrollbar{width:5px;height:5px;}
        ::-webkit-scrollbar-track{background:var(--surface2);}
        ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
        code{font-family:var(--font-mono);font-size:.8em;background:var(--surface3);padding:.1em .4em;border-radius:3px;}
      `}</style>

      {/* ── Header ── */}
      <header style={{ background: "linear-gradient(135deg, #7c2d12 0%, #9a3d20 60%, #b45309 100%)", padding: "1rem 2rem", display: "flex", alignItems: "center", justifyContent: "space-between", boxShadow: "0 2px 16px rgba(0,0,0,.25)" }}>
        <div>
          <div style={{ fontFamily: "var(--font-display)", fontSize: "1.5rem", fontWeight: 700, color: "#fff", letterSpacing: "-0.01em", lineHeight: 1.2 }}>OpenSpeaks Tome</div>
          <div style={{ fontSize: "0.68rem", color: "rgba(255,255,255,.65)", letterSpacing: "0.1em", textTransform: "uppercase", marginTop: "3px" }}>Create metadata for oral knowledge</div>
        </div>
        <div style={{ display: "flex", gap: "0.5rem", flexShrink: 0 }}>
          {[`Schema ${SCHEMA_VERSION}`, "OPEX/IMDI", "BLAM/CMDI"].map(tag => (
            <span key={tag} style={{ background: "rgba(255,255,255,.15)", color: "rgba(255,255,255,.9)", border: "1px solid rgba(255,255,255,.3)", borderRadius: "999px", padding: "0.2rem 0.65rem", fontSize: "0.65rem", fontWeight: 600, letterSpacing: "0.05em" }}>{tag}</span>
          ))}
        </div>
      </header>

      {/* ── Tab Bar ── */}
      <div style={{ background: "var(--surface2)", borderBottom: "1.5px solid var(--border)", padding: "0 1.5rem", overflowX: "auto", display: "flex", justifyContent: "space-between", alignItems: "flex-end" }}>
        <div style={{ display: "flex", gap: "2px", minWidth: "max-content" }}>
          {TABS.map(t => (
            <button key={t.id} className={`tab-btn ${activeTab === t.id ? "active" : ""}`} onClick={() => setActiveTab(t.id)}>
              <span>{t.icon}</span> {t.label}
            </button>
          ))}
        </div>
        <button className="btn-sec" onClick={resetForm} style={{ marginBottom: "4px", fontSize: ".72rem", padding: ".35rem .7rem" }}>↺ Reset</button>
      </div>

      {clearMsg && <div style={{ background: "#f0fdf4", padding: ".5rem 1.5rem", fontSize: ".78rem", color: "var(--success)", borderBottom: "1px solid #bbf7d0" }}>{clearMsg}</div>}

      {/* ── Main ── */}
      <main style={{ maxWidth: "920px", margin: "0 auto", padding: "2rem 1.5rem" }}>

        {/* ─── BASIC INFO ─── */}
        {activeTab === "basic" && (
          <div>
            <SectionTitle title="Basic Information" sub="Fill in the main details about the file" />
            <div style={G2}>
              <Field label="File Name"><FInput value={record.fileName} onChange={v => updateField("fileName", v)} placeholder="example: juray001.mp4" /></Field>
              <Field label="File Type">
                <FSelect value={record.fileType} onChange={v => updateField("fileType", v)}
                  options={[{value:"video",label:"Video"},{value:"audio",label:"Audio"},{value:"image",label:"Image"},{value:"document",label:"Document"}]} />
              </Field>
            </div>
            <Field label="Title" help="Main title of the file. You can write it in more than one language, separated by / or |">
              <FInput value={record.title} onChange={v => updateField("title", v)} placeholder="Juray language documentation / जुराय भाषा दस्तावेज़ीकरण" />
            </Field>
            <Field label="Title in native/other language"><FInput value={record.originalTitle} onChange={v => updateField("originalTitle", v)} placeholder="Title in original language or script (optional)" /></Field>
            <Field label="File description" help="Write a description in English. You can add descriptions in other languages below.">
              <FTextarea value={record.description} onChange={v => updateField("description", v)} rows={5} placeholder="Describe the session, its context, and why it is important. Example: In this video, First3 Last3 talks about..." />
              {/* Extra-language descriptions */}
              {(record.extraDescriptions || []).map((ed, idx) => (
                <div key={idx} style={{ marginTop: "0.75rem", display: "flex", gap: "0.5rem", alignItems: "flex-start" }}>
                  <select value={ed.langCode} onChange={e => {
                    const next = [...(record.extraDescriptions || [])];
                    next[idx] = { ...next[idx], langCode: e.target.value };
                    updateField("extraDescriptions", next);
                  }} style={{ padding: "0.4rem 0.5rem", borderRadius: "6px", border: "1.5px solid var(--border)", background: "var(--surface)", color: "var(--text)", fontSize: "0.78rem", minWidth: "9rem", flexShrink: 0 }}>
                    {LANG_CODES.map(l => <option key={l.code} value={l.code}>{l.code} — {l.name}</option>)}
                  </select>
                  <FTextarea value={ed.text} onChange={v => {
                    const next = [...(record.extraDescriptions || [])];
                    next[idx] = { ...next[idx], text: v };
                    updateField("extraDescriptions", next);
                  }} rows={3} placeholder={`Description in ${langName(ed.langCode)}...`} style={{ flex: 1 }} />
                  <button onClick={() => {
                    const next = (record.extraDescriptions || []).filter((_, i) => i !== idx);
                    updateField("extraDescriptions", next);
                  }} title="Remove" style={{ background: "none", border: "none", color: "var(--muted)", cursor: "pointer", fontSize: "1.1rem", lineHeight: 1, paddingTop: "0.4rem" }}>✕</button>
                </div>
              ))}
              <button className="btn-sec" style={{ marginTop: "0.6rem", fontSize: "0.75rem" }} onClick={() => {
                const next = [...(record.extraDescriptions || []), { langCode: "hi", text: "" }];
                updateField("extraDescriptions", next);
              }}>+ Add description in another language</button>
            </Field>
            <div style={G2}>
              <Field label="Language" help="Name of the language spoken in the recording. For a dialect, write it as Dialect–Language, e.g. Marchha-Rongpo">
                <FInput value={record.language} onChange={v => updateField("language", v)} placeholder="Marchha-Rongpo" />
              </Field>
              <Field label={<span>Language ISO 639 code <a href="https://iso639-3.sil.org/code_tables/639/data" target="_blank" rel="noreferrer" style={{ fontSize: "0.7rem", color: "var(--accent2)", textDecoration: "none", fontWeight: 400, textTransform: "none", letterSpacing: 0 }}>more ↗</a></span>}><FInput value={record.languageISO} onChange={v => updateField("languageISO", v)} placeholder="juy" /></Field>
            </div>
            <div style={G2}>
              <Field label="Country"><FInput value={record.country} onChange={v => updateField("country", v)} placeholder="India" /></Field>
              <Field label="Recording Location"><FInput value={record.recordingPlace} onChange={v => updateField("recordingPlace", v)} placeholder="Village/City, Province/State" /></Field>
            </div>
            <div style={G3}>
              <Field label="Recording Date" help="When was it recorded? Use format YYYY-MM-DD"><FInput value={record.releaseDate} onChange={v => updateField("releaseDate", v)} placeholder="2026-04-16" /></Field>
              <Field label="Publication Date" help="When was it published or uploaded? Use format YYYY-MM-DD"><FInput value={record.date} onChange={v => updateField("date", v)} placeholder="2026-04-07" /></Field>
              <Field label="Duration / Runtime"><FInput value={record.duration} onChange={v => updateField("duration", v)} placeholder="2:25 min" /></Field>
            </div>
            <div style={G3}>
              <Field label="Color">
                <FSelect value={record.color} onChange={v => updateField("color", v)} options={[{value:"Color",label:"Color"},{value:"Black and white",label:"Black & White"},{value:"Mixed",label:"Mixed"}]} />
              </Field>
              <Field label="Sound">
                <FSelect value={record.sound} onChange={v => updateField("sound", v)} options={[{value:"Stereo",label:"Stereo"},{value:"Mono",label:"Mono"},{value:"Silent",label:"Silent"}]} />
              </Field>
              <Field label="File source"><FInput value={record.source} onChange={v => updateField("source", v)} placeholder="{{own}}" /></Field>
            </div>
          </div>
        )}

        {/* ─── PRODUCTION ─── */}
        {activeTab === "production" && (
          <div>
            <SectionTitle title="Production Details" sub="Crew, identifiers, and classification metadata" />
            <Field label="Project Name"><FInput value={record.projectName} onChange={v => updateField("projectName", v)} placeholder="OpenSpeaks Archives" /></Field>
            <div style={G2}>
              <Field label="Cast / Featured Speaker(s)"><FInput value={record.cast} onChange={v => updateField("cast", v)} placeholder="First3 Last3" /></Field>
              <Field label="Genre"><FInput value={record.genre} onChange={v => updateField("genre", v)} placeholder="Interview" /></Field>
            </div>
            <Field label="Topic"><FInput value={record.topic} onChange={v => updateField("topic", v)} placeholder="Language documentation" /></Field>
            <div style={G2}>
              <Field label="Producer"><FInput value={record.producer} onChange={v => updateField("producer", v)} /></Field>
              <Field label="Director"><FInput value={record.director} onChange={v => updateField("director", v)} /></Field>
            </div>
            <div style={G2}>
              <Field label="Writer"><FInput value={record.writer} onChange={v => updateField("writer", v)} /></Field>
              <Field label="Cinematographer"><FInput value={record.cinematographer} onChange={v => updateField("cinematographer", v)} /></Field>
            </div>
            <div style={G2}>
              <Field label="Editor"><FInput value={record.editor} onChange={v => updateField("editor", v)} /></Field>
              <Field label="Recordist / Camera Operator"><FInput value={record.recordist} onChange={v => updateField("recordist", v)} /></Field>
            </div>
            <div style={{ borderTop: "1px solid var(--border)", paddingTop: "1.5rem", marginTop: "0.5rem" }}>
              <div style={{ fontFamily: "var(--font-display)", fontSize: "1.1rem", color: "var(--text2)", marginBottom: "1rem", fontStyle: "italic" }}>Identifiers</div>
              <div style={G3}>
                <Field label="DOI / EIDR"><FInput value={record.doi} onChange={v => updateField("doi", v)} placeholder="10.5240/XXXX" /></Field>
                <Field label="IMDb"><FInput value={record.imdb} onChange={v => updateField("imdb", v)} placeholder="tt14546228" /></Field>
                <Field label="ISRC"><FInput value={record.isrc || ""} onChange={v => updateField("isrc", v)} /></Field>
              </div>
            </div>
          </div>
        )}

        {/* ─── PEOPLE ─── */}
        {activeTab === "people" && (
          <div>
            <SectionTitle title="People & Attribution" sub="Author, copyright holder, and participant data" />
            <PreviewBox label="Live preview — generated |author= field" content={formatAuthorField(record)} />
            <div style={G2}>
              <Field label="Author Username (Commons)" help="No 'User:' prefix. Goes into the Copyright line of |author=.">
                <FInput value={record.authorUsername} onChange={v => updateField("authorUsername", v)} placeholder="First1 Last1" />
              </Field>
              <Field label="Copyright Holder" help="Fallback if no username. No longer emitted as |Copyright_holder= in {{OpenSpeaks}}.">
                <FInput value={record.copyrightHolder} onChange={v => updateField("copyrightHolder", v)} placeholder="First1 Last1" />
              </Field>
            </div>

            <div style={{ borderTop: "1px solid var(--border)", paddingTop: "1.5rem", marginTop: "0.5rem" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "1rem" }}>
                <div>
                  <div style={{ fontFamily: "var(--font-display)", fontSize: "1.1rem", color: "var(--text2)", fontStyle: "italic" }}>Interviewees / Participants</div>
                  <div style={{ fontSize: "0.7rem", color: "var(--muted)", marginTop: "2px" }}>Used for the Moral Rights line. QID enables <code>{"{{Wikidata|QID}}"}</code>.</div>
                </div>
                <button className="btn-primary" onClick={addInterviewee}>+ Add Person</button>
              </div>

              {record.interviewees.length === 0 && (
                <div style={{ textAlign: "center", padding: "2.5rem 1rem", color: "var(--muted)", background: "var(--surface2)", borderRadius: "8px", fontSize: "0.85rem", border: "2px dashed var(--border)" }}>
                  No participants added. Click "+ Add Person" to start.
                </div>
              )}

              {record.interviewees.map((ie, idx) => (
                <div key={idx} style={{ background: "var(--surface2)", border: "1.5px solid var(--border)", borderRadius: "8px", padding: "1rem", marginBottom: "0.75rem", position: "relative" }}>
                  <button onClick={() => removeIE(idx)} style={{ position: "absolute", top: "0.75rem", right: "0.75rem", background: "none", border: "none", cursor: "pointer", color: "var(--muted)", fontSize: "1.2rem", lineHeight: 1 }}>×</button>
                  <div style={G2}>
                    <Field label={`Person ${idx + 1} — Full Name`}><FInput value={ie.fullName} onChange={v => updateIE(idx, "fullName", v)} placeholder="First3 Last3" /></Field>
                    <Field label="Wikidata QID" help="e.g. Q138978470 — unlocks {{Wikidata|QID}} in author field">
                      <FInput value={ie.wikidataQid} onChange={v => updateIE(idx, "wikidataQid", v)} placeholder="Q138978470" />
                    </Field>
                  </div>
                  <div style={G2}>
                    <Field label="Gender">
                      <FSelect value={ie.gender} onChange={v => updateIE(idx, "gender", v)}
                        options={[{value:"male",label:"Male"},{value:"female",label:"Female"},{value:"non-binary",label:"Non-binary"},{value:"unknown",label:"Unknown"}]} />
                    </Field>
                    <Field label="Role"><FInput value={ie.role} onChange={v => updateIE(idx, "role", v)} placeholder="Research participant" /></Field>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ─── SUBTITLES & ORAL HISTORY ─── */}
        {activeTab === "subtitles" && (
          <div>
            <SectionTitle title="Subtitles & Oral Knowledge" sub="Subtitle details and consent / community review framework" />
            <PreviewBox label="Live preview — generated |Subtitles= field" content={formatSubtitles(record)} />

            <div style={{ fontFamily: "var(--font-display)", fontSize: "1.1rem", color: "var(--text2)", marginBottom: "1rem", fontStyle: "italic" }}>Subtitle Details</div>
            <div style={G2}>
              <Field label="Subtitle Language"><FInput value={record.subtitleLanguage} onChange={v => updateField("subtitleLanguage", v)} placeholder="English" /></Field>
              <Field label="TimedText Page URL or Name" help="Full URL or just TimedText:… page name">
                <FInput value={record.subtitlePageUrl} onChange={v => updateField("subtitlePageUrl", v)} placeholder="https://commons.wikimedia.org/wiki/TimedText:OpenSpeaks-..." />
              </Field>
            </div>
            <Field label="Subtitle Creators" help="Comma-separated names of people who created the subtitles">
              <FInput value={record.subtitleCreators} onChange={v => updateField("subtitleCreators", v)} placeholder="First6 Last6, First5 Last5" />
            </Field>
            <Field label="Editors / Reviewers" help="Use '/' to split editors from reviewers: 'Editor1, Editor2 / Reviewer1'. Without '/', first name = editor, second = reviewer.">
              <FInput value={record.subtitleEditorsReviewers} onChange={v => updateField("subtitleEditorsReviewers", v)} placeholder="First1 Last1 / First2 Last2" />
            </Field>

            <div style={{ borderTop: "1px solid var(--border)", paddingTop: "1.5rem", marginTop: "1rem" }}>
              <div style={{ fontFamily: "var(--font-display)", fontSize: "1.1rem", color: "var(--text2)", marginBottom: "1rem", fontStyle: "italic" }}>Parameter 1: Provenance & Consent</div>
              <div style={G2}>
                <Field label="Interviewer"><FInput value={record.oralHistory.interviewer} onChange={v => updateOH("interviewer", v)} placeholder="First2 Last2" /></Field>
                <Field label="Recorder / Camera Operator"><FInput value={record.oralHistory.recorder} onChange={v => updateOH("recorder", v)} placeholder="First1 Last1" /></Field>
              </div>
              <div style={G2}>
                <Field label="Recording Context">
                  <FSelect value={record.oralHistory.recordingContext} onChange={v => updateOH("recordingContext", v)}
                    options={[{value:"field_recording",label:"Field Recording"},{value:"studio",label:"Studio"},{value:"remote",label:"Remote/Online"},{value:"other",label:"Other"}]} />
                </Field>
                <Field label="Recording Equipment"><FInput value={record.oralHistory.recordingEquipment} onChange={v => updateOH("recordingEquipment", v)} placeholder="Lav mic, Camera" /></Field>
              </div>
              <div style={G2}>
                <Field label="Consent Type">
                  <FSelect value={record.oralHistory.consentType} onChange={v => updateOH("consentType", v)}
                    options={[{value:"verbal",label:"Verbal"},{value:"written",label:"Written"},{value:"both",label:"Both (verbal + written)"},{value:"unknown",label:"Unknown"}]} />
                </Field>
                <Field label="Consent Record Location"><FInput value={record.oralHistory.consentRecordLocation} onChange={v => updateOH("consentRecordLocation", v)} placeholder="Jholasahi, Gajapati district" /></Field>
              </div>
              <div style={{ display: "flex", gap: "1.5rem", flexWrap: "wrap", marginBottom: "1.25rem" }}>
                <FCheckbox label="Consent Informed" checked={record.oralHistory.consentInformed} onChange={v => updateOH("consentInformed", v)} />
                <FCheckbox label="Consent Revocable" checked={record.oralHistory.consentRevocable} onChange={v => updateOH("consentRevocable", v)} />
                <FCheckbox label="Sensitive Content" checked={record.oralHistory.sensitiveContent} onChange={v => updateOH("sensitiveContent", v)} />
              </div>
            </div>

            <div style={{ borderTop: "1px solid var(--border)", paddingTop: "1.5rem", marginTop: "0.5rem" }}>
              <div style={{ fontFamily: "var(--font-display)", fontSize: "1.1rem", color: "var(--text2)", marginBottom: "1rem", fontStyle: "italic" }}>Parameter 2: Community Review</div>
              <div style={{ marginBottom: "1rem" }}>
                <FCheckbox label="Community Reviewed" checked={record.oralHistory.communityReviewed} onChange={v => updateOH("communityReviewed", v)} />
              </div>
              <div style={G2}>
                <Field label="Review Date"><FInput value={record.oralHistory.communityReviewDate} onChange={v => updateOH("communityReviewDate", v)} placeholder="2026-05-07" /></Field>
                <Field label="Reviewer(s)"><FInput value={record.oralHistory.communityReviewers} onChange={v => updateOH("communityReviewers", v)} placeholder="First2 Last2" /></Field>
              </div>
              <Field label="Review Notes"><FTextarea value={record.oralHistory.communityReviewNotes} onChange={v => updateOH("communityReviewNotes", v)} rows={3} placeholder="Notes about the community review process..." /></Field>
            </div>

            <div style={{ borderTop: "1px solid var(--border)", paddingTop: "1.5rem", marginTop: "0.5rem" }}>
              <div style={{ fontFamily: "var(--font-display)", fontSize: "1.1rem", color: "var(--text2)", marginBottom: "1rem", fontStyle: "italic" }}>Parameter 3: Transcription</div>
              <div style={{ marginBottom: "1rem" }}>
                <FCheckbox label="Transcript Available" checked={record.oralHistory.transcriptAvailable} onChange={v => updateOH("transcriptAvailable", v)} />
              </div>
              <div style={G2}>
                <Field label="Transcript Language(s)"><FInput value={record.oralHistory.transcriptLanguages} onChange={v => updateOH("transcriptLanguages", v)} placeholder="English, Juray" /></Field>
                <Field label="Transcript Date"><FInput value={record.oralHistory.transcriptDate} onChange={v => updateOH("transcriptDate", v)} placeholder="2026-04-08" /></Field>
              </div>
              <div style={G2}>
                <Field label="Transcript Writer"><FInput value={record.oralHistory.transcriptWriter} onChange={v => updateOH("transcriptWriter", v)} /></Field>
                <Field label="Transcript Editor"><FInput value={record.oralHistory.transcriptEditor} onChange={v => updateOH("transcriptEditor", v)} /></Field>
              </div>
              <Field label="Transcript Link"><FInput value={record.oralHistory.transcriptLink} onChange={v => updateOH("transcriptLink", v)} placeholder="https://commons.wikimedia.org/wiki/TimedText:..." /></Field>
            </div>
          </div>
        )}

        {/* ─── LICENSE & CATEGORIES ─── */}
        {activeTab === "license" && (
          <div>
            <SectionTitle title="License & Categories" sub="Framework parameters and Wikimedia Commons categorization" />
            <Field label="License">
              <FSelect value={record.license} onChange={v => updateField("license", v)}
                options={[
                  {value:"cc-by-sa-4.0",label:"CC BY-SA 4.0 (recommended for oral knowledge)"},
                  {value:"cc-by-4.0",label:"CC BY 4.0"},
                  {value:"cc-zero",label:"CC0 (Public Domain Dedication)"},
                  {value:"cc-by-sa-3.0",label:"CC BY-SA 3.0"},
                  {value:"cc-by-3.0",label:"CC BY 3.0"},
                ]} />
            </Field>

            <div style={{ background: "var(--accent-light)", border: "1px solid rgba(180,83,9,.25)", borderRadius: "10px", padding: "1.5rem", marginBottom: "2rem" }}>
              <div style={{ fontFamily: "var(--font-display)", fontSize: "1.1rem", color: "#92400e", marginBottom: "1rem", fontStyle: "italic" }}>OpenSpeaks Framework Parameters</div>
              <div style={{ display: "flex", flexDirection: "column", gap: "1rem" }}>
                <FCheckbox label="P1: Provenance & Consent — The recording has documented consent and clear provenance" checked={record.framework_p1} onChange={v => updateField("framework_p1", v)} />
                <FCheckbox label="P2: Community Review — Content has been reviewed by the documented language community" checked={record.framework_p2} onChange={v => updateField("framework_p2", v)} />
                <FCheckbox label="P3: Multilingual Transcription — Subtitles or transcripts are available in at least one language" checked={record.framework_p3} onChange={v => updateField("framework_p3", v)} />
              </div>
            </div>

            <Field label="Categories" help="One category per line (or comma-separated). Do not include [[Category: ]] brackets.">
              <FTextarea value={record.categories} onChange={v => updateField("categories", v)} rows={12}
                placeholder={"Juray language\nFirst3 Last3\nFirst2 Last2\nOral knowledge\nFiles uploaded from OpenSpeaks Archives in 2026\nMedia related to WMF grant ID G-GS-2502-18088"} />
            </Field>
          </div>
        )}

        {/* ─── IMPORT ─── */}
        {activeTab === "import" && (
          <div>
            <SectionTitle title="Import" sub="Bring in metadata from a URL, a file, or by pasting text" />

            {parseMsg.type === "error" && (
              <div style={{ background: "#fef2f2", border: "1px solid #fca5a5", borderRadius: "8px", padding: ".75rem 1rem", marginBottom: "1.5rem", color: "var(--error)", fontSize: ".85rem" }}>⚠️ {parseMsg.text}</div>
            )}
            {parseMsg.type === "success" && (
              <div style={{ background: "#f0fdf4", border: "1px solid #86efac", borderRadius: "8px", padding: ".75rem 1rem", marginBottom: "1.5rem", color: "var(--success)", fontSize: ".85rem" }}>{parseMsg.text}</div>
            )}

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "1rem", marginBottom: "2.5rem" }}>
              {[
                { label: "OpenSpeaks JSON", sub: ".json", icon: "📄", accept: ".json", handler: e => handleFileImport(e, importOpenSpeaksJSON, "OpenSpeaks JSON") },
                { label: "OPEX / IMDI 3.0", sub: ".opex or .xml", icon: "🗂️", accept: ".opex,.xml", handler: e => handleFileImport(e, parseOpexToRecord, "OPEX/IMDI file") },
                { label: "BLAM / CMDI", sub: ".jsonld or .json", icon: "🔗", accept: ".jsonld,.json", handler: e => handleFileImport(e, parseBlamToRecord, "BLAM/CMDI file") },
              ].map(({ label, sub, icon, accept, handler }) => (
                <label key={label} className="import-zone">
                  <span style={{ fontSize: "2rem" }}>{icon}</span>
                  <div style={{ fontWeight: 600, color: "var(--text2)" }}>{label}</div>
                  <div style={{ fontSize: "0.7rem" }}>{sub}</div>
                  <input type="file" accept={accept} onChange={handler} style={{ display: "none" }} />
                </label>
              ))}
            </div>

            <div style={{ borderTop: "1px solid var(--border)", paddingTop: "1.75rem", marginBottom: "2rem" }}>
              <div style={{ fontFamily: "var(--font-display)", fontSize: "1.2rem", color: "var(--text2)", marginBottom: "0.35rem", fontStyle: "italic" }}>Fetch metadata from a URL</div>
              <p style={{ fontSize: "0.78rem", color: "var(--muted)", margin: "0 0 0.75rem 0", lineHeight: 1.6 }}>
                Paste a URL and click <strong>Fetch metadata</strong>. The tool reads the page and fills the form automatically.
              </p>

              {/* Site chips */}
              <div style={{ display: "flex", gap: "0.45rem", flexWrap: "wrap", marginBottom: "0.9rem" }}>
                {[
                  { name: "Wikimedia Commons", color: "#3B84D0", example: "https://commons.wikimedia.org/wiki/File:OpenSpeaks-juy-Juray-Dinabandhu_Gamango-OG-Social_Impact_of_Aadhaar.webm", note: "Direct API" },
                  { name: "Internet Archive", color: "#4A6FA5", example: "https://archive.org/details/IDENTIFIER", note: "Direct API" },
                  { name: "Wikidata", color: "#990000", example: "https://www.wikidata.org/wiki/Q12345", note: "Direct API" },
                  { name: "Pad.ma", color: "#5C6BC0", example: "https://pad.ma/IDENTIFIER", note: "AI-assisted" },
                  { name: "Indiancine.ma", color: "#2E7D32", example: "https://indiancine.ma/CWEZ/info", note: "AI-assisted" },
                  { name: "ELAR", color: "#6A4C93", example: "https://www.elararchive.org/dk0848", note: "AI-assisted" },
                ].map(site => (
                  <button key={site.name} onClick={() => setCommonsUrl(site.example)}
                    title={"Click to fill example URL — " + site.note}
                    style={{ display: "inline-flex", alignItems: "center", gap: "0.3rem", padding: "0.28rem 0.65rem", borderRadius: "999px", border: "1.5px solid " + site.color, background: "transparent", color: site.color, fontSize: "0.72rem", fontWeight: 600, cursor: "pointer", fontFamily: "inherit", whiteSpace: "nowrap" }}>
                    {site.name}
                    <span style={{ fontSize: "0.62rem", opacity: 0.75, fontWeight: 400 }}>({site.note})</span>
                  </button>
                ))}
              </div>

              <p style={{ fontSize: "0.72rem", color: "var(--muted)", margin: "0 0 0.75rem 0", lineHeight: 1.5 }}>
                <strong>Direct API</strong> — fetches data directly from the site's public API (fast, reliable).{" "}
                <strong>AI-assisted</strong> — uses AI to read the page and extract metadata (a few seconds; requires internet access).
              </p>

              <div style={{ display: "flex", gap: "0.65rem", alignItems: "center", flexWrap: "wrap" }}>
                <input
                  type="url"
                  value={commonsUrl}
                  onChange={e => setCommonsUrl(e.target.value)}
                  placeholder="Paste a URL or click a site button above…"
                  style={{ flex: "1 1 320px", padding: "0.5rem 0.65rem", borderRadius: "6px", border: "1.5px solid var(--border)", background: "var(--surface)", color: "var(--text)", fontSize: "0.82rem", fontFamily: "inherit" }}
                  onKeyDown={e => { if (e.key === "Enter") fetchFromUrl(); }}
                />
                <button className="btn-primary" onClick={fetchFromUrl} disabled={fetchingCommons} style={{ whiteSpace: "nowrap", opacity: fetchingCommons ? 0.7 : 1 }}>
                  {fetchingCommons ? "⏳ Fetching…" : "⬇ Fetch metadata"}
                </button>
                <button className="btn-sec" onClick={() => { setCommonsUrl(""); setParseMsg({}); }} style={{ whiteSpace: "nowrap" }}>Clear</button>
              </div>
            </div>

                        <div style={{ borderTop: "1px solid var(--border)", paddingTop: "1.75rem" }}>
              <div style={{ fontFamily: "var(--font-display)", fontSize: "1.2rem", color: "var(--text2)", marginBottom: "0.4rem", fontStyle: "italic" }}>Paste text or upload a file</div>
              <p style={{ fontSize: "0.78rem", color: "var(--muted)", margin: "0 0 0.6rem 0", lineHeight: 1.6 }}>
                Paste text from any source — the tool detects the format and fills the form automatically. You can also upload a file.
              </p>
              <ul style={{ fontSize: "0.76rem", color: "var(--muted)", margin: "0 0 1rem 1.25rem", padding: 0, lineHeight: 1.9 }}>
                <li><strong>Wikimedia Commons wikitext</strong> — a full file page with <code>{"{{Information}}"}</code> and/or <code>{"{{OpenSpeaks}}"}</code></li>
                <li><strong>Plain-text or spreadsheet notes</strong> — lines like <code>Language: Juray (ISO 639: juy)</code> or <code>Cast: Name</code> work fine</li>
                <li><strong>.txt or .docx file</strong> — use the upload button below; the text is read and parsed for you</li>
              </ul>
              <label className="import-zone" style={{ display: "flex", flexDirection: "row", alignItems: "center", justifyContent: "center", gap: "0.65rem", padding: "0.85rem 1rem", marginBottom: "1rem" }}>
                <span style={{ fontSize: "1.4rem" }}>📂</span>
                <div>
                  <div style={{ fontWeight: 600, fontSize: "0.8rem", color: "var(--text2)" }}>Upload a file (.txt or .docx)</div>
                  <div style={{ fontSize: "0.68rem", color: "var(--muted)" }}>Plain text, wikitext, or Word document</div>
                </div>
                <input type="file" accept=".txt,.docx" style={{ display: "none" }} onChange={e => {
                  const file = e.target.files[0]; if (!file) return;
                  const isDOCX = file.name.toLowerCase().endsWith(".docx");
                  if (isDOCX) {
                    if (typeof mammoth === "undefined") {
                      setParseMsg({ type: "error", text: "Mammoth library not loaded yet. Try refreshing the page." }); return;
                    }
                    const reader = new FileReader();
                    reader.onload = ev => {
                      mammoth.extractRawText({ arrayBuffer: ev.target.result })
                        .then(res2 => {
                          const text = res2.value; setPasteInput(text);
                          const { result: parsed, format } = parseAnyInput(text);
                          applyParsed(parsed, `Word document "${file.name}"`);
                        })
                        .catch(() => setParseMsg({ type: "error", text: `Could not extract text from "${file.name}". Ensure it is a valid .docx file.` }));
                    };
                    reader.readAsArrayBuffer(file);
                  } else {
                    const reader = new FileReader();
                    reader.onload = ev => {
                      const text = ev.target.result; setPasteInput(text);
                      const { result: parsed, format } = parseAnyInput(text);
                      applyParsed(parsed, `file "${file.name}"`);
                    };
                    reader.readAsText(file);
                  }
                  e.target.value = "";
                }} />
              </label>
              <FTextarea value={pasteInput} onChange={setPasteInput} rows={16}
                placeholder={`Paste wikitext OR plain-text metadata here. Examples:\n\n── Commons wikitext ──────────────────────\n=={{int:filedesc}}==\n{{Information\n|description=\n{{OpenSpeaks\n|description=In this video...\n|Language=Juray (ISO 639: juy)\n|Location=Village, District, State/Province, Country\n|Runtime=2:25 min\n|Framework_p1=yes\n|Framework_p2=yes\n|Framework_p3=yes\n}}\n|date=2026-04-07\n|author=\n; Moral Rights: {{Wikidata|Q138978470}}\n; Copyright: [[User:SubhashishPanigrahi]]\n}}\n{{self|cc-by-sa-4.0}}\n[[Category:Juray language]]\n\n── Plain-text metadata ───────────────────\nProject/Film name: OpenSpeaks Archives\nCast: First3 Last3\nLanguage: Juray (ISO 639: juy)\nRuntime: 2:25 min\nGenre: Documentary\nIMDb tt14546228\nProducer: First1 Last1\nSubtitles: In English by Name1 (creator), Name2 (editor)`}
              />
              <div style={{ display: "flex", gap: "0.75rem", marginTop: "1rem", flexWrap: "wrap", alignItems: "center" }}>
                <button className="btn-primary" onClick={handleParseWikitext}>⚡ Parse into form</button>
                <button className="btn-sec" onClick={() => { setPasteInput(""); setParseMsg({}); }}>Clear</button>
                <span style={{ fontSize: "0.7rem", color: "var(--muted)", marginLeft: "0.25rem" }}>The format is detected automatically.</span>
              </div>
            </div>
          </div>
        )}

        {/* ─── PREVIEW & EXPORT ─── */}
        {activeTab === "export" && (
          <div>
            <SectionTitle title="Preview & Export" sub="Check the output and copy or download it" />

            <div style={{ display: "flex", gap: "0.5rem", marginBottom: "1.25rem", flexWrap: "wrap", alignItems: "center" }}>
              {[
                { id: "wikicode", label: "{{}} Wikicode" },
                { id: "json", label: "{ } JSON" },
                { id: "markdown", label: "✦ Markdown" },
                { id: "html", label: "<> HTML" },
              ].map(f => (
                <button key={f.id} className={`efmt-btn ${exportFmt === f.id ? "active" : ""}`} onClick={() => setExportFmt(f.id)}>{f.label}</button>
              ))}
              <div style={{ flex: 1 }} />
              <button className="btn-sec" onClick={copyOutput}>{copied ? "✓ Copied!" : "📋 Copy"}</button>
              <button className="btn-primary" onClick={downloadOutput}>⬇ Download</button>
            </div>

            <pre style={{ fontFamily: "var(--font-mono)", fontSize: "0.7rem", lineHeight: 1.75, whiteSpace: "pre-wrap", wordBreak: "break-all", background: "#1a120b", color: "#f5e6d8", padding: "1.5rem", borderRadius: "10px", maxHeight: "55vh", overflowY: "auto", margin: "0 0 1.25rem 0" }}>{generatedOutput}</pre>

            <div style={{ background: "var(--surface2)", borderRadius: "8px", padding: "1rem 1.25rem", fontSize: "0.75rem", color: "var(--muted)", lineHeight: 1.6 }}>
              <strong style={{ color: "var(--text2)" }}>Format notes:</strong> <strong>Wikicode</strong> generates the full Commons file description page with <code>{"{{Information}}"}</code>, nested <code>{"{{OpenSpeaks}}"}</code>, oral knowledge tables (P1–P3), license, and categories. <code>|Copyright_holder=</code> is intentionally omitted from <code>{"{{OpenSpeaks}}"}</code> — copyright is surfaced in <code>|author=</code> instead. <strong>JSON</strong> uses the OpenSpeaks v1.2 schema and can be re-imported. <strong>Markdown</strong> and <strong>HTML</strong> are human-readable reference formats.
            </div>
          </div>
        )}
            </main>

      {/* ── Footer ── */}
      <footer
        style={{
          borderTop: "1px solid var(--border)",
          padding: "0.85rem 1.5rem 1.25rem 1.5rem",
          fontSize: "0.72rem",
          color: "var(--muted)",
          background: "var(--surface2)",
        }}
      >
        <div style={{ maxWidth: "920px", margin: "0 auto" }}>
          <div style={{ marginBottom: "0.25rem" }}>
            This tool helps create and edit metadata for audio, video, images and documents
            related to oral knowledge. You can also import and export metadata from
            OpenSpeaks Archives, Wikimedia Commons (wikitext), Endangered Languages Archive
            (Lameta/OPEX), and Language Archive Cologne (BLAM).
          </div>
          <div>
            Version {APP_VERSION} (Schema {SCHEMA_VERSION}) ·{" "}
            <span>
              Under{" "}
              {/* Replace href once you have the actual GitHub repo URL */}
              <a
                href="https://opensource.org/license/mit"
                target="_blank"
                rel="noreferrer"
                style={{ color: "var(--accent2)", textDecoration: "none" }}
              >
                MIT License
              </a>
            </span>
            {" · "}
            <a
              href="https://github.com/openspeaks/Tome"
              target="_blank"
              rel="noreferrer"
              style={{ color: "var(--accent2)", textDecoration: "none" }}
            >
              GitHub repository
            </a>
          </div>
        </div>
      </footer>
    </div>
  );
}
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
